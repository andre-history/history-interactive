<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folkvandringstiden — Interaktiv Karta</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#d4a843;--gold-l:#f0c85a;--txt:#f5e8c0;
  --pbg:rgba(10,6,2,0.97);--brd:#7a5e18;
  --battle:#c0392b;--pol:#d4a843;--mig:#2e86ab;--clim:#8b6be8;--sca:#2d8a4e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080f1e;overflow:hidden;height:100vh;font-family:'Cormorant Garamond',serif;user-select:none}
#app{display:flex;flex-direction:column;height:100vh}
#mwrap{flex:1;position:relative;min-height:0}
#map{width:100%;height:100%}

.leaflet-container{background:#0d1a2e}
.leaflet-bar a{background:rgba(10,6,2,.92)!important;color:#d4a843!important;border-color:rgba(122,94,24,.5)!important}
.leaflet-bar a:hover{background:rgba(212,168,67,.12)!important}
.leaflet-control-attribution{font-size:9px!important;background:rgba(10,6,2,.7)!important;color:rgba(245,232,192,.3)!important}
.leaflet-control-attribution a{color:rgba(245,232,192,.45)!important}
/* Custom event tooltip */
.ev-tip{background:rgba(10,6,2,0.96)!important;border:1px solid #7a5e18!important;border-radius:3px!important;padding:6px 10px!important;color:#f5e8c0!important;font-family:'Cormorant Garamond',serif!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important}
.ev-tip::before{display:none!important}

/* Title */
#ttl{position:absolute;top:18px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:900}
#ttl h1{font-family:'Cinzel',serif;color:var(--gold-l);font-size:1.35rem;letter-spacing:5px;font-weight:600;text-shadow:0 2px 14px rgba(0,0,0,.95)}
#ttl p{color:rgba(245,232,192,.42);font-size:.78rem;letter-spacing:2.5px;margin-top:3px}

/* Legend */
#leg{position:absolute;bottom:160px;left:14px;background:rgba(10,6,2,.92);border:1px solid var(--brd);padding:10px 14px;border-radius:3px;z-index:800}
.li{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:.72rem;color:var(--txt);font-family:'Cinzel',serif}
.li:last-child{margin:0}
.ld{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);flex-shrink:0}

/* Panel */
#pnl{position:absolute;top:16px;right:-425px;width:385px;max-height:calc(100vh - 200px);background:var(--pbg);border:1px solid var(--brd);border-radius:3px;overflow-y:auto;transition:right .4s cubic-bezier(.25,.46,.45,.94);z-index:1000;box-shadow:-6px 0 40px rgba(0,0,0,.8)}
#pnl.open{right:16px}
#pnl::-webkit-scrollbar{width:4px}
#pnl::-webkit-scrollbar-thumb{background:var(--brd)}
.ph{padding:18px 20px 14px;border-bottom:1px solid var(--brd);position:relative}
.py{font-family:'Cinzel',serif;color:var(--gold);font-size:.72rem;letter-spacing:3px;margin-bottom:6px}
.pt{font-family:'Cinzel',serif;color:var(--txt);font-size:1.15rem;line-height:1.35;padding-right:28px}
.pbadge{display:inline-block;margin-top:10px;padding:3px 9px;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:1.5px;border-radius:2px}
.pbdy{padding:16px 20px}
.pbdy p{color:rgba(245,232,192,.82);font-size:.98rem;line-height:1.75;margin-bottom:8px}
.psrc{font-style:italic;color:rgba(212,168,67,.6);font-size:.84rem;border-left:2px solid var(--brd);padding-left:12px;margin-top:12px}
.pcls{position:absolute;top:13px;right:13px;background:none;border:1px solid var(--brd);color:var(--gold);width:26px;height:26px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;border-radius:2px}
.pcls:hover{background:rgba(212,168,67,.15)}

/* Scandinavia */
#sbtn{position:absolute;top:18px;left:14px;background:rgba(10,6,2,.88);border:1px solid var(--sca);color:var(--sca);padding:7px 13px;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:1.5px;cursor:pointer;border-radius:2px;z-index:900}
#sbtn:hover{background:rgba(45,138,78,.15)}
#spnl{position:absolute;top:52px;left:-325px;width:298px;background:var(--pbg);border:1px solid var(--sca);border-radius:3px;z-index:900;transition:left .4s cubic-bezier(.25,.46,.45,.94)}
#spnl.open{left:14px}
.ssh{padding:11px 15px;border-bottom:1px solid rgba(45,138,78,.22);font-family:'Cinzel',serif;color:var(--sca);font-size:.6rem;letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
.ssb{padding:8px 14px}
.ssi{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(45,138,78,.1)}
.ssi:last-child{border:none}
.ssy{font-family:'Cinzel',serif;color:var(--sca);font-size:.64rem;min-width:52px;padding-top:2px}
.sst{color:rgba(245,232,192,.72);font-size:.84rem;line-height:1.45}

/* ── TIMELINE ── */
#tl{height:150px;background:rgba(4,2,1,.98);border-top:1px solid var(--brd);flex-shrink:0;position:relative;z-index:1000}
#tl-topbar{height:26px;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
#tl-label{font-family:'Cinzel',serif;color:rgba(212,168,67,.32);font-size:.52rem;letter-spacing:2.5px}
#tl-zoom-controls{display:flex;align-items:center;gap:6px}
.zc-btn{background:rgba(212,168,67,.08);border:1px solid rgba(122,94,24,.5);color:var(--gold);font-family:'Cinzel',serif;font-size:.7rem;width:22px;height:22px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;line-height:1}
.zc-btn:hover{background:rgba(212,168,67,.18)}
#tl-zoom-level{font-family:'Cinzel',serif;color:rgba(212,168,67,.5);font-size:.6rem;min-width:60px;text-align:center}
#tl-canvases{padding:0 14px;height:72px}
#tlc{display:block;cursor:crosshair;width:100%;height:72px}
#tl-overview{padding:2px 14px}
#ovrc{display:block;cursor:pointer;width:100%;height:10px}
#yrd{font-family:'Cinzel',serif;color:var(--gold-l);font-size:1.2rem;text-align:center;letter-spacing:5px;line-height:32px}

/* Lens */
#lens{position:absolute;background:rgba(4,2,1,.98);border:1px solid var(--gold);border-radius:3px;padding:10px 12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:1100;min-width:228px;bottom:160px}
#lens.show{opacity:1}
.lh{font-family:'Cinzel',serif;color:var(--gold);font-size:.58rem;letter-spacing:2px;margin-bottom:7px}
.lr{display:flex;gap:8px;align-items:center;padding:3px 0;font-size:.8rem;color:rgba(245,232,192,.8)}
.lyr{font-family:'Cinzel',serif;color:var(--gold);font-size:.62rem;min-width:38px}
</style>
</head>
<body>
<div id="app">
  <div id="mwrap">
    <div id="map"></div>
    <div id="ttl"><h1>FOLKVANDRINGSTIDEN</h1><p>ca. 370 – 600 e.Kr. &nbsp;·&nbsp; Scrolla på tidslinjen för att zooma</p></div>
    <button id="sbtn">⬡ SKANDINAVIEN</button>
    <div id="spnl">
      <div class="ssh">SKANDINAVIEN UNDER FOLKVANDRINGSTIDEN
        <button onclick="tgScand()" style="background:none;border:none;color:inherit;cursor:pointer;font-size:1.1rem">×</button>
      </div>
      <div class="ssb" id="ssb"></div>
    </div>
    <div id="leg">
      <div class="li"><div class="ld" style="background:#c0392b"></div>Slag &amp; plundring</div>
      <div class="li"><div class="ld" style="background:#d4a843"></div>Politisk händelse</div>
      <div class="li"><div class="ld" style="background:#2e86ab"></div>Folkrörelse</div>
      <div class="li"><div class="ld" style="background:#8b6be8"></div>Klimat &amp; kris</div>
      <div class="li"><div class="ld" style="background:#2d8a4e"></div>Skandinavien</div>
    </div>
    <div id="lens"><div class="lh">HÄNDELSER NÄRA</div><div id="lrows"></div></div>
    <div id="pnl">
      <div class="ph">
        <div class="py" id="pyr"></div>
        <div class="pt" id="ptit"></div>
        <div class="pbadge" id="pbdg"></div>
        <button class="pcls" onclick="closePanel()">×</button>
      </div>
      <div class="pbdy"><div id="pbdy"></div><div class="psrc" id="psrc"></div></div>
    </div>
  </div>

  <div id="tl">
    <div id="tl-topbar">
      <div id="tl-label">TIDSLINJE — SCROLLA FÖR ZOOM · DRA FÖR PAN · KLICKA FÖR ATT NAVIGERA</div>
      <div id="tl-zoom-controls">
        <div id="tl-zoom-level">230 år</div>
        <button class="zc-btn" id="zin-btn" title="Zooma in">+</button>
        <button class="zc-btn" id="zout-btn" title="Zooma ut">−</button>
        <button class="zc-btn" id="zreset-btn" title="Återställ zoom" style="font-size:.55rem;width:28px">↩</button>
      </div>
    </div>
    <div id="tl-canvases">
      <canvas id="tlc"></canvas>
    </div>
    <div id="tl-overview"><canvas id="ovrc"></canvas></div>
    <div id="yrd">370 e.Kr.</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── TYPE CONFIG ───────────────────────────────────────
const TC={battle:'#c0392b',politics:'#d4a843',migration:'#2e86ab',climate:'#8b6be8',scandinavia:'#2d8a4e'};
const TL2={battle:'SLAG & PLUNDRING',politics:'POLITISK HÄNDELSE',migration:'FOLKRÖRELSE',climate:'KLIMAT & KRIS',scandinavia:'SKANDINAVIEN'};
const TI={battle:'⚔',politics:'♔',migration:'➤',climate:'❄',scandinavia:'◈'};

// ── EVENTS ── (staggered coords to avoid overlap)
const EVS=[
  {id:'hun', year:370, type:'migration', label:'Hunnerna vid Svarta havet',       lat:46.5, lon:38.5,
   title:'Hunnerna anländer från öster',
   body:'Hunnerna, nomader från Centralasien, dyker upp vid Svarta havet ca 370 e.Kr. Deras framfart skapar en krusningseffekt: folk efter folk längs stäppen tvingas västerut. Det är den primära gnistan som tänder folkvandringstiden.',
   src:'Ammianus Marcellinus, Res Gestae XXXI (ca 380 e.Kr.)'},
  {id:'vis', year:376, type:'migration', label:'Visigoterna söker skydd vid Donau', lat:44.5, lon:28.0,
   title:'Visigoterna passerar Donau',
   body:'Under trycket från hunnerna tillåts visigoterna korsa Donau in i romerskt territorium. Uppskattningsvis 100 000–200 000 personer passerar gränsen. De korrupta rom-tjänstemän som ska ta hand om flyktingarna misshandlar dem grovt — med katastrofala konsekvenser.',
   src:'Ammianus Marcellinus, Res Gestae XXXI:4'},
  {id:'adr', year:378, type:'battle',    label:'Slaget vid Adrianopel',            lat:41.68, lon:26.56,
   title:'Adrianopel — Roms öde avgörs',
   body:'Den 9 augusti 378 möter visigoterna kejsar Valens utanför Adrianopel. Den kejserliga armén förintas och Valens faller i strid — enda gången en kejsare dödas av yttre folk på flera hundra år. Roms militära överlägsenhet är bruten en gång för alla.',
   src:'Ammianus Marcellinus, Res Gestae XXXI:12–13'},
  {id:'spl', year:395, type:'politics',  label:'Romarriket delas permanent',       lat:43.6, lon:13.5,
   title:'Imperiet delas i öst och väst',
   body:'Vid Theodosius I:s död delas riket: Honorius får väst (Ravenna praktisk huvudstad från 402) och Arkadios får öst (Konstantinopel). En tillfällig åtgärd som blir definitiv — halvorna driver alltmer isär kulturellt, ekonomiskt och militärt.',
   src:'Zosimos, Historia Nova IV'},
  {id:'upp', year:400, type:'scandinavia',label:'Uppåkra — Skandinaviens centrum', lat:55.62, lon:13.1,
   title:'Uppåkra — Skandinaviens mäktigaste centralplats',
   body:'I Skåne blomstrar Uppåkra under 400–600-talen. Arkeologer har funnit ett ceremonihus (hov) i kontinuerlig användning från 200-talet till 900-talet, rikt med guldgubbar — präglade guldbleck med gudomliga figurer. Romarguld som solidi och brakteater vittnar om kontakterna med kontinenten.',
   src:'Uppåkraprojektet, Lunds universitet (Larsson & Hårdh)'},
  {id:'rhn', year:406, type:'migration', label:'Vandalerna korsar Rhen på is',     lat:50.1, lon:7.6,
   title:'Rhen fryser — riksgränsen kollapsar',
   body:'Vid nyåret 406/407 fryser Rhen till is. Vandaler, alaner och svever marscherar rakt in i Gallien. Det tunt spridda gränsförsvaret överväldiga på en natt. Gränsen som hållit i 400 år kollapsar.',
   src:'Hieronymus, Epistula 123 (ca 409 e.Kr.)'},
  {id:'ala', year:410, type:'battle',    label:'Alaric plundrar Rom',              lat:41.9, lon:12.5,
   title:'Rom plundras — för första gången på 800 år',
   body:'Visigoterna besätter Rom den 24 augusti 410. Den "eviga staden" faller för yttre folk för första gången sedan gallerna 390 f.Kr. Plundringen varar tre dagar. Augustinus skriver "Guds stad" delvis som svar på den kollektiva chocken.',
   src:'Augustinus, De Civitate Dei (413–426 e.Kr.)'},
  {id:'for', year:435, type:'scandinavia',label:'Fornborgar byggs i Skåne',        lat:55.9, lon:14.0,
   title:'Fornborgar — oroligheten når Norden',
   body:'Fornborgar som Stenshuvud och Hälleberga backe i Skåne dateras till 400–550 e.Kr. Jordanes nämner i Getica (ca 551) ett tjugotal folk på "Scandza", däribland svear och daner.',
   src:'Jordanes, Getica 3; RAÄ fornminnesregister'},
  {id:'car', year:430, type:'migration', label:'Vandalerna erövrar Kartago',       lat:36.85, lon:10.33,
   title:'Vandalerna tar Roms kornkammare',
   body:'Geiserik erövrar Kartago — en av Roms rikaste städer och central för spannmålsförsörjningen. Vandalerna kontrollerar nu matflödet till Rom och bygger en flotta som utmanar det romerska havet.',
   src:'Victor av Vita, Historia persecutionis Africanae provinciae'},
  {id:'cat', year:451, type:'battle',    label:'Katalauniska fälten',              lat:48.55, lon:4.35,
   title:'Attila stoppas på Katalauniska fälten',
   body:'Attilas armé drar djupt in i Gallien men möts av generalen Aetius och den visigotiske kungen Theoderik I. Slaget slutar oavgjort och Attila tvingas retirera — Roms sista stora militära prestation.',
   src:'Jordanes, Getica 36–38 (ca 551 e.Kr.)'},
  {id:'r55', year:455, type:'battle',    label:'Vandalerna plundrar Rom',          lat:41.85, lon:12.48,
   title:'Geiseriks vandaler plundrar Rom',
   body:'Med sin Nordafrika-flotta seglar Geiserik upp Tibern och plundrar Rom i 14 dagar. Platina-taket från Jupiterstemplet fraktas till Kartago. Episoden ger eftervärlden ordet "vandalism".',
   src:'Prokopios, De Bello Vandalico I:5'},
  {id:'fal', year:476, type:'politics',  label:'Västroms fall',                    lat:44.42, lon:12.18,
   title:'Den siste västromerske kejsaren avsätts',
   body:'Den 4 september 476 avsätter Odoacer den unge Romulus Augustulus och sänder de kejserliga insignierna till Konstantinopel. Traditionellt slutet på antiken i väst. Germanska kungar bevarar dock latin, romersk rätt och institutioner.',
   src:'Jordanes, Romana (ca 551 e.Kr.)'},
  {id:'the', year:493, type:'politics',  label:'Theoderik erövrar Italien',        lat:44.5, lon:11.8,
   title:'Theoderik den store — goten som var romare',
   body:'Ostrogoten Theoderik grundar ett rike i Italien och behåller senaten och den romerska administrationen. Han anlitar Boethius och Cassiodorus i sin tjänst. Hans hov i Ravenna är ett kulturcentrum där gotisk makt möter romskt arv.',
   src:'Cassiodorus, Variae (ca 537 e.Kr.)'},
  {id:'clo', year:496, type:'politics',  label:'Clovis konverterar till kristendomen', lat:49.05, lon:2.85,
   title:'Clovis — frankernas kung döper sig',
   body:'Clovis konverterar till romersk kristendom 496 e.Kr. Konversionen är politiskt briljant: den gall-romerska kyrkan ger nu stöd till hans expansion. Han lägger grunden till det framtida Frankrike och Karl den stores imperium.',
   src:'Gregorius av Tours, Historia Francorum II (ca 575 e.Kr.)'},
  {id:'cli', year:536, type:'climate',   label:'Klimatkatastrofen 536 — Fimbulvinter', lat:51.0, lon:14.5,
   title:'Solen slocknar — Fimbulvinter',
   body:'År 536 fördunklas solen av ett mystiskt dis i 18 månader. Troligen ett vulkanutbrott. Tre missväxtår leder till hungersnöd och social oro i hela Europa och Asien. Dendrokronologiska studier bekräftar kylperioden. Historiker ser detta som ursprunget till myten om Fimbulvintern.',
   src:'Prokopios, Historia Arcana; Büntgen et al., Science 2016'},
];

const SDATA=[
  {yr:'370–500',t:'Guldinflöde: Romarguld (solidi) och brakteater strömmar in till Norden som del av tribut-ekonomin.'},
  {yr:'400–600',t:'Uppåkra blomstrar som Skandinaviens viktigaste centralplats med hov och guldgubbar.'},
  {yr:'430–550',t:'Fornborgar byggs i Skåne: Stenshuvud och Hälleberga backe vittnar om politisk oro.'},
  {yr:'ca 551', t:'Jordanes nämner i Getica tjugotal folk på "Scandza" — svear, daner och skånska stammar.'},
];

const MPATHS=[
  {col:'#8b6be8',start:370,peak:400,end:455,latlngs:[[46,40],[44,38],[43,35],[43,32],[44.5,28],[43.5,26],[41.7,26.6]]},
  {col:'#2e86ab',start:376,peak:415,end:480,latlngs:[[44.5,28],[42,27],[41.7,26.6],[41,23],[40,20],[40,17],[41.5,15],[41.9,12.5],[41,8],[40,3],[39,-1],[38,-4],[40,-5]]},
  {col:'#c0392b',start:406,peak:445,end:476,latlngs:[[50.1,7.6],[48,4],[46,1],[43,-1],[41,-2],[38,-4],[37,-6],[36,0],[36,5],[36.85,10.33],[38,13],[41.9,12.5]]},
  {col:'#d4a843',start:488,peak:495,end:550,latlngs:[[47,32],[46,28],[45,24],[44.5,20],[44.5,16],[44.42,12.18]]},
  {col:'#2d8a4e',start:481,peak:498,end:560,latlngs:[[51,7.5],[50,5],[49,3],[48,2],[47,1],[44,1],[43,2]]},
];

// ── LEAFLET MAP ───────────────────────────────────────
let map, year=370, scandOpen=false;
const markers={};
const pathLayers=[];

function initMap(){
  map=L.map('map',{center:[48,18],zoom:4,minZoom:3,maxZoom:9});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com">CARTO</a>',
    subdomains:'abcd',maxZoom:20,
  }).addTo(map);

  // CircleMarkers — SVG-based, always interactive:true
  EVS.forEach(ev=>{
    const c=TC[ev.type];
    const cm=L.circleMarker([ev.lat,ev.lon],{
      radius:12,
      fillColor:c,
      color:'rgba(255,255,255,0.75)',
      weight:2,
      fillOpacity:0,
      opacity:0,
      interactive:true,
      bubblingMouseEvents:false,
    }).addTo(map);

    cm.bindTooltip(
      `<span style="font-family:Cinzel,serif;color:${c};font-size:11px;font-weight:600">${ev.year} e.Kr.</span><br><span style="font-size:12px">${ev.label}</span>`,
      {sticky:true,direction:'top',offset:[0,-10],opacity:1,className:'ev-tip'}
    );

    cm.on('click',()=>{ if(year>=ev.year) openPanel(ev); });
    cm.on('mouseover',function(){ if(year>=ev.year) this.setStyle({radius:17,weight:2.5}); });
    cm.on('mouseout', function(){ this.setStyle({radius:12,weight:2}); });
    markers[ev.id]=cm;
  });

  // Migration paths
  MPATHS.forEach(mp=>{
    const line=L.polyline([],{color:mp.col,weight:2.5,opacity:0,dashArray:'10 6',lineCap:'round'}).addTo(map);
    pathLayers.push({line,mp});
  });

  updateMarkers();
  updatePaths();
}

function updateMarkers(){
  EVS.forEach(ev=>{
    const m=markers[ev.id];
    if(!m) return;
    const vis=year>=ev.year;
    m.setStyle({fillOpacity:vis?0.88:0, opacity:vis?1:0});
    // Toggle SVG pointer-events so hidden markers don't block map clicks
    const el=m.getElement();
    if(el) el.style.pointerEvents=vis?'auto':'none';
  });
}

function updatePaths(){
  pathLayers.forEach(({line,mp})=>{
    if(year<mp.start){line.setLatLngs([]);line.setStyle({opacity:0});return;}
    const prog=Math.min(1,(year-mp.start)/(mp.peak-mp.start));
    let op=year<=mp.peak?prog*0.75:year<=mp.end?0.75*(1-(year-mp.peak)/(mp.end-mp.peak))*0.45+0.25:0;
    if(op<=0.01){line.setLatLngs([]);line.setStyle({opacity:0});return;}
    const pts=mp.latlngs,total=pts.length-1;
    const endSeg=Math.min(Math.floor(prog*total),total-1);
    const frac=prog*total-endSeg;
    const shown=pts.slice(0,endSeg+1);
    if(endSeg<total){const p1=pts[endSeg],p2=pts[endSeg+1];shown.push([p1[0]+(p2[0]-p1[0])*frac,p1[1]+(p2[1]-p1[1])*frac]);}
    line.setLatLngs(shown);
    line.setStyle({opacity:op});
  });
}

// ── PANEL ─────────────────────────────────────────────
function openPanel(ev){
  document.getElementById('pyr').textContent=ev.year+' e.Kr.';
  document.getElementById('ptit').textContent=ev.title;
  const b=document.getElementById('pbdg');
  b.textContent=TL2[ev.type];
  b.style.cssText=`background:${TC[ev.type]}22;color:${TC[ev.type]};border:1px solid ${TC[ev.type]}55;`;
  document.getElementById('pbdy').innerHTML='<p>'+ev.body+'</p>';
  document.getElementById('psrc').textContent=ev.src||'';

function closePanel(){document.getElementById('pnl').classList.remove('open');}
window.closePanel=closePanel;

// ── SCANDINAVIA ───────────────────────────────────────
let scandOpen2=false;
function tgScand(){
  scandOpen2=!scandOpen2;
  document.getElementById('spnl').classList.toggle('open',scandOpen2);
  document.getElementById('sbtn').textContent=scandOpen2?'× SKANDINAVIEN':'⬡ SKANDINAVIEN';
  if(scandOpen2) document.getElementById('ssb').innerHTML=SDATA.map(d=>
    `<div class="ssi"><span class="ssy">${d.yr}</span><span class="sst">${d.t}</span></div>`).join('');
}
window.tgScand=tgScand;
document.getElementById('sbtn').addEventListener('click',tgScand);

// ── TIMELINE: ELASTIC + ZOOM/PAN ─────────────────────
// Elastic weights (dense zones wider)
const SEGS=[{s:370,e:420,w:2.8},{s:420,e:480,w:1.6},{s:480,e:520,w:1.9},{s:520,e:600,w:1.0}];
const FULL_START=370, FULL_END=600;

function elasticAccum(yr){
  let a=0;
  for(const d of SEGS){
    if(yr>=d.e) a+=d.w*(d.e-d.s);
    else if(yr>=d.s){a+=d.w*(yr-d.s);break;}
  }
  return a;
}
const TOTAL_ACCUM=elasticAccum(600);

// View window
let vStart=FULL_START, vEnd=FULL_END;    // current (animated)
let tvStart=FULL_START, tvEnd=FULL_END;  // target
let animId=null;

// Animate view window toward target
function animateView(){
  if(animId) cancelAnimationFrame(animId);
  const step=()=>{
    const eps=0.05, lp=0.14;
    vStart+=(tvStart-vStart)*lp;
    vEnd  +=(tvEnd  -vEnd  )*lp;
    drawTL(); drawOvr();
    if(Math.abs(vStart-tvStart)>eps||Math.abs(vEnd-tvEnd)>eps)
      animId=requestAnimationFrame(step);
    else{vStart=tvStart;vEnd=tvEnd;drawTL();drawOvr();}
  };
  animId=requestAnimationFrame(step);
}

function setView(s,e,animate=true){
  const span=Math.max(10,Math.min(230,e-s));
  tvStart=Math.max(FULL_START,s);
  tvEnd=Math.min(FULL_END,tvStart+span);
  if(tvEnd>=FULL_END){tvEnd=FULL_END;tvStart=Math.max(FULL_START,tvEnd-span);}
  if(animate) animateView();
  else{vStart=tvStart;vEnd=tvEnd;drawTL();drawOvr();}
  updateZoomLabel();
}

function zoomBy(factor, centerYr){
  const span=tvEnd-tvStart;
  const newSpan=Math.max(15,Math.min(230,span*factor));
  const c=centerYr!==undefined?centerYr:(tvStart+tvEnd)/2;
  const ratio=(c-tvStart)/span;
  setView(c-ratio*newSpan, c+(1-ratio)*newSpan);
}

function updateZoomLabel(){
  const span=Math.round(tvEnd-tvStart);
  document.getElementById('tl-zoom-level').textContent=span+' år';
}

// Convert year → canvas X within current view (elastic within view)
function yrX(yr, W){
  const margin=14;
  const trackW=W-margin*2;
  const a0=elasticAccum(Math.max(FULL_START,vStart));
  const a1=elasticAccum(Math.min(FULL_END,vEnd));
  const span=a1-a0;
  if(span<=0) return margin;
  const ay=elasticAccum(Math.max(vStart,Math.min(vEnd,yr)));
  return margin+((ay-a0)/span)*trackW;
}

// Convert canvas X → year
function xYr(x, W){
  const margin=14;
  const trackW=W-margin*2;
  const frac=Math.max(0,Math.min(1,(x-margin)/trackW));
  const a0=elasticAccum(Math.max(FULL_START,vStart));
  const a1=elasticAccum(Math.min(FULL_END,vEnd));
  const targetA=a0+frac*(a1-a0);
  // Binary search year
  let lo=FULL_START,hi=FULL_END;
  for(let i=0;i<30;i++){
    const mid=(lo+hi)/2;
    if(elasticAccum(mid)<targetA) lo=mid; else hi=mid;
  }
  return Math.max(FULL_START,Math.min(FULL_END,(lo+hi)/2));
}

// ── MAIN TIMELINE CANVAS ─────────────────────────────
const tlc=document.getElementById('tlc');
const tlctx=tlc.getContext('2d');
let TLW=0,TLH=0,tlDpr=1;
let tlDragMode=null; // 'scrub' | 'pan'
let tlPanStartX=0, tlPanStartV=[FULL_START,FULL_END];

function initTL(){
  tlDpr=window.devicePixelRatio||1;
  TLW=tlc.offsetWidth||tlc.parentElement.offsetWidth; TLH=72;
  tlc.width=TLW*tlDpr; tlc.height=TLH*tlDpr;
  tlctx.setTransform(1,0,0,1,0,0);
  tlctx.scale(tlDpr,tlDpr);
  drawTL();
}

function drawTL(){
  if(!TLW||!TLH) return;
  const W=TLW, H=TLH;
  tlctx.clearRect(0,0,W,H);

  const ty=H*0.58, th=3;
  const vSpan=vEnd-vStart;

  // Dense zone indicators (show elastic zones that are in view)
  const densePeriods=[{s:370,e:420,label:'TÄTPACKAD PERIOD'}];
  densePeriods.forEach(dp=>{
    if(dp.e<vStart||dp.s>vEnd) return;
    const x1=yrX(Math.max(dp.s,vStart),W);
    const x2=yrX(Math.min(dp.e,vEnd),W);
    const dg=tlctx.createLinearGradient(x1,0,x2,0);
    dg.addColorStop(0,'rgba(212,168,67,0)');
    dg.addColorStop(0.3,'rgba(212,168,67,0.07)');
    dg.addColorStop(0.7,'rgba(212,168,67,0.07)');
    dg.addColorStop(1,'rgba(212,168,67,0)');
    tlctx.fillStyle=dg; tlctx.fillRect(x1,0,x2-x1,ty);
    if(vSpan<=80&&x2-x1>40){
      tlctx.fillStyle='rgba(212,168,67,0.28)';
      tlctx.font='7px Cinzel,serif'; tlctx.textAlign='center';
      tlctx.fillText(dp.label,(x1+x2)/2,8);
    }
  });

  // Track
  const tg=tlctx.createLinearGradient(14,0,W-14,0);
  tg.addColorStop(0,'rgba(212,168,67,.06)');tg.addColorStop(0.2,'rgba(212,168,67,.8)');
  tg.addColorStop(0.8,'rgba(212,168,67,.5)');tg.addColorStop(1,'rgba(212,168,67,.06)');
  tlctx.fillStyle=tg; tlctx.fillRect(14,ty,W-28,th);

  // Auto-compute year grid based on zoom level
  let gridYears=[];
  if(vSpan<=20) gridYears=range(Math.ceil(vStart),Math.floor(vEnd),1);
  else if(vSpan<=50) gridYears=range(Math.ceil(vStart/5)*5,Math.floor(vEnd/5)*5+1,5);
  else if(vSpan<=120) gridYears=range(Math.ceil(vStart/10)*10,Math.floor(vEnd/10)*10+1,10);
  else gridYears=range(Math.ceil(vStart/25)*25,Math.floor(vEnd/25)*25+1,25);

  gridYears.forEach(y=>{
    if(y<vStart||y>vEnd) return;
    const x=yrX(y,W);
    tlctx.fillStyle='rgba(212,168,67,.2)';
    tlctx.fillRect(x-.5,ty-3,1,th+6);
    tlctx.fillStyle='rgba(212,168,67,.45)';
    tlctx.font='8.5px Cinzel,serif'; tlctx.textAlign='center';
    tlctx.fillText(y,x,ty+18);
  });

  // Event dots + ticks — only events in view
  EVS.forEach(ev=>{
    if(ev.year<vStart-2||ev.year>vEnd+2) return;
    const x=yrX(ev.year,W), c=TC[ev.type];
    const active=year>=ev.year;
    // Tick
    tlctx.globalAlpha=active?.6:.25;
    tlctx.fillStyle=c; tlctx.fillRect(x-1,ty-14,2,9);
    // Dot
    tlctx.globalAlpha=1;
    tlctx.beginPath(); tlctx.arc(x,ty+th/2,active?6:4,0,Math.PI*2);
    tlctx.fillStyle=active?c:c+'44'; tlctx.fill();
    tlctx.strokeStyle='rgba(245,232,192,.2)'; tlctx.lineWidth=1; tlctx.stroke();
    // Year label when zoomed in enough
    if(vSpan<=100){
      tlctx.fillStyle=active?c:'rgba(212,168,67,.3)';
      tlctx.font=`7.5px Cinzel,serif`; tlctx.textAlign='center';
      tlctx.fillText(ev.year,x,ty-18);
    }
  });

  // Scrubber (only if year is in view)
  if(year>=vStart-5&&year<=vEnd+5){
    const sx=yrX(year,W);
    tlctx.strokeStyle='#f0c85a'; tlctx.lineWidth=1.8;
    tlctx.beginPath(); tlctx.moveTo(sx,0); tlctx.lineTo(sx,H); tlctx.stroke();
    tlctx.fillStyle='#f0c85a';
    tlctx.beginPath();
    tlctx.moveTo(sx,ty-10); tlctx.lineTo(sx+7,ty+th/2);
    tlctx.lineTo(sx,ty+th+10); tlctx.lineTo(sx-7,ty+th/2);
    tlctx.closePath(); tlctx.fill();
    // Year label on scrubber
    tlctx.fillStyle='rgba(12,8,2,.85)';
    const lw=32; tlctx.fillRect(sx-lw/2,ty+th+11,lw,14);
    tlctx.fillStyle='#f0c85a'; tlctx.font='bold 8px Cinzel,serif'; tlctx.textAlign='center';
    tlctx.fillText(year,sx,ty+th+21);
  }
}

function range(start,end,step){
  const r=[];
  for(let i=start;i<=end;i+=step) r.push(i);
  return r;
}

// ── OVERVIEW (minimap) ────────────────────────────────
const ovrc=document.getElementById('ovrc');
const ovrctx=ovrc.getContext('2d');
let OW=0,OH=0;

function initOvr(){
  const dpr=window.devicePixelRatio||1;
  OW=ovrc.offsetWidth||ovrc.parentElement.offsetWidth; OH=10;
  ovrc.width=OW*dpr; ovrc.height=OH*dpr;
  ovrctx.setTransform(1,0,0,1,0,0);
  ovrctx.scale(dpr,dpr);
  drawOvr();
}

// Simple linear (non-elastic) overview
function ovrX(yr){ return((yr-FULL_START)/(FULL_END-FULL_START))*(OW-4)+2; }
function ovrYr(x){ return FULL_START+((x-2)/(OW-4))*(FULL_END-FULL_START); }

function drawOvr(){
  if(!OW||!OH) return;
  ovrctx.clearRect(0,0,OW,OH);
  const H=OH;

  // Background track
  ovrctx.fillStyle='rgba(212,168,67,.12)';
  ovrctx.fillRect(2,H*.3,OW-4,H*.4);

  // Current view window highlight
  const x1=ovrX(vStart), x2=ovrX(vEnd);
  ovrctx.fillStyle='rgba(212,168,67,.22)';
  ovrctx.fillRect(x1,0,x2-x1,H);
  ovrctx.strokeStyle='rgba(212,168,67,.5)';
  ovrctx.lineWidth=1;
  ovrctx.strokeRect(x1+.5,0.5,x2-x1-1,H-1);

  // Event dots on overview
  EVS.forEach(ev=>{
    const x=ovrX(ev.year);
    ovrctx.fillStyle=year>=ev.year?TC[ev.type]:TC[ev.type]+'55';
    ovrctx.beginPath(); ovrctx.arc(x,H/2,2.5,0,Math.PI*2); ovrctx.fill();
  });

  // Scrubber position
  const sx=ovrX(year);
  ovrctx.fillStyle='#f0c85a';
  ovrctx.fillRect(sx-1,0,2,H);
}

// ── TIMELINE INTERACTION ──────────────────────────────
function isScrubberHit(x,W){
  const sx=yrX(year,W);
  return Math.abs(x-sx)<10;
}

tlc.addEventListener('mousedown',e=>{
  const r=tlc.getBoundingClientRect();
  const x=e.clientX-r.left;
  if(isScrubberHit(x,TLW)||true){ // always start as potential scrub
    tlDragMode='scrub';
    setYrFromX(x);
  }
  tlPanStartX=x;
  tlPanStartV=[tvStart,tvEnd];
});

tlc.addEventListener('mousemove',e=>{
  const r=tlc.getBoundingClientRect();
  const x=e.clientX-r.left;

  if(tlDragMode==='scrub'){
    setYrFromX(x);
  } else if(tlDragMode==='pan'){
    // Pan: shift view by delta years
    const dx=x-tlPanStartX;
    const vSpan=tlPanStartV[1]-tlPanStartV[0];
    const trackW=TLW-28;
    // In elastic space: dx pixels = how many years?
    const a0=elasticAccum(tlPanStartV[0]);
    const a1=elasticAccum(tlPanStartV[1]);
    const aSpan=a1-a0;
    const aDelta=-(dx/trackW)*aSpan;
    const newA0=a0+aDelta;
    // Find years corresponding to newA0 and newA0+aSpan
    const newS=accumToYr(newA0);
    const newE=accumToYr(newA0+aSpan);
    setView(newS,newE,false);
  }

  // Switch to pan mode if moved significantly without hitting scrubber
  if(tlDragMode==='scrub'&&Math.abs(x-tlPanStartX)>8&&!isScrubberHit(tlPanStartX,TLW)){
    tlDragMode='pan';
  }

  // Lens
  const hoverYr=xYr(x,TLW);
  const near=EVS.filter(ev=>Math.abs(ev.year-hoverYr)<=Math.max(5,((tvEnd-tvStart)/10))).sort((a,b)=>a.year-b.year);
  const lens=document.getElementById('lens');
  if(near.length>=2){
    document.getElementById('lrows').innerHTML=near.map(ev=>
      `<div class="lr"><span class="lyr">${ev.year}</span><span style="color:${TC[ev.type]}">●</span><span>${ev.label}</span></div>`).join('');
    let lx=e.clientX-115; lx=Math.max(10,Math.min(window.innerWidth-245,lx));
    lens.style.left=lx+'px'; lens.classList.add('show');
  } else lens.classList.remove('show');
});

document.addEventListener('mouseup',()=>{ tlDragMode=null; });

tlc.addEventListener('click',e=>{
  const r=tlc.getBoundingClientRect();
  setYrFromX(e.clientX-r.left);
});

// Scroll to zoom (Premiere Pro style)
tlc.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=tlc.getBoundingClientRect();
  const mx=e.clientX-r.left;
  const hoverYr=xYr(mx,TLW);
  const factor=e.deltaY>0?1.25:0.8;
  zoomBy(factor,hoverYr);
},{passive:false});

tlc.addEventListener('mouseleave',()=>document.getElementById('lens').classList.remove('show'));

function setYrFromX(x){
  const y=Math.max(FULL_START,Math.min(FULL_END,Math.round(xYr(x,TLW))));
  setYear(y);
}

// Overview interaction
let ovrDrag=false;
ovrc.addEventListener('mousedown',()=>ovrDrag=true);
document.addEventListener('mouseup',()=>ovrDrag=false);
ovrc.addEventListener('mousemove',e=>{
  if(!ovrDrag) return;
  const r=ovrc.getBoundingClientRect();
  const cx=e.clientX-r.left;
  const cy=ovrYr(cx);
  const span=tvEnd-tvStart;
  setView(cy-span/2,cy+span/2);
});
ovrc.addEventListener('click',e=>{
  const r=ovrc.getBoundingClientRect();
  const cx=e.clientX-r.left;
  const cy=ovrYr(cx);
  const span=tvEnd-tvStart;
  setView(cy-span/2,cy+span/2);
});

// Zoom buttons
document.getElementById('zin-btn').addEventListener('click',()=>zoomBy(0.6,year));
document.getElementById('zout-btn').addEventListener('click',()=>zoomBy(1.667,year));
document.getElementById('zreset-btn').addEventListener('click',()=>{setView(FULL_START,FULL_END);});

// Helper: elastic accumulation → year
function accumToYr(a){
  a=Math.max(0,Math.min(TOTAL_ACCUM,a));
  let lo=FULL_START,hi=FULL_END;
  for(let i=0;i<30;i++){
    const mid=(lo+hi)/2;
    if(elasticAccum(mid)<a) lo=mid; else hi=mid;
  }
  return (lo+hi)/2;
}

// ── GLOBAL YEAR STATE ─────────────────────────────────
function setYear(y){
  y=Math.max(FULL_START,Math.min(FULL_END,Math.round(y)));
  if(y===year) return;
  year=y;
  document.getElementById('yrd').textContent=y+' e.Kr.';

  // Auto-zoom: if year moves outside current view, re-center
  if(y<tvStart||y>tvEnd){
    const span=tvEnd-tvStart;
    setView(y-span*0.4,y+span*0.6);
  }

  updateMarkers();
  updatePaths();
  drawTL();
  drawOvr();
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight') setYear(year+5);
  if(e.key==='ArrowLeft')  setYear(year-5);
  if(e.key==='+')          zoomBy(0.6,year);
  if(e.key==='-')          zoomBy(1.667,year);
  if(e.key==='Escape')     closePanel();
});

// ── INIT ──────────────────────────────────────────────
function initAll(){
  initMap();
  setTimeout(()=>{
    initTL();
    initOvr();
    updateZoomLabel();
  },50);
}

window.addEventListener('load', initAll);
window.addEventListener('resize',()=>{
  initTL();
  initOvr();
});
</script>
