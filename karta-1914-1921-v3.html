<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europas gränser 1914–1921</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#12131f;--surface:#1c1e30;--surface2:#252840;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);
  --text:#e8e6dc;--text2:#9896a0;--text3:#6b6978;
  --gold:#d4aa50;--gold2:#a07830;
}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#loading.hidden{display:none}
#loading-spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:var(--text2)}
#loading-error{display:none;font-size:13px;color:#E24B4A;text-align:center;max-width:400px;line-height:1.6}
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;flex-shrink:0;display:flex;align-items:flex-start;gap:20px}
#header h1{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;white-space:nowrap;padding-top:2px}
#step-desc{font-size:12.5px;color:var(--text2);line-height:1.5;flex:1;border-left:2px solid var(--gold2);padding-left:12px;min-height:32px}
#timeline{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#timeline::-webkit-scrollbar{display:none}
.step-btn{background:none;border:none;border-bottom:3px solid transparent;color:var(--text3);padding:8px 18px;cursor:pointer;font-family:'Source Sans 3',sans-serif;text-align:left;white-space:nowrap;transition:color .15s,border-color .15s,background .15s}
.step-btn:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.step-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.step-btn .yr{display:block;font-size:13px;font-weight:600}
.step-btn .lbl{display:block;font-size:10px;margin-top:1px;opacity:.75}
#map-wrap{flex:1;position:relative;min-height:0}
#map{width:100%;height:100%}
#legend{position:absolute;bottom:30px;left:14px;background:rgba(18,19,31,0.93);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;z-index:1000;backdrop-filter:blur(6px);min-width:185px;pointer-events:none}
#legend-title{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px;color:var(--text2)}
.legend-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;border:1px solid rgba(255,255,255,0.15)}
#info-panel{position:absolute;top:14px;right:14px;width:295px;background:rgba(18,19,31,0.96);border:1px solid var(--border2);border-radius:10px;padding:16px;z-index:1000;backdrop-filter:blur(8px);transform:translateX(325px);transition:transform .28s cubic-bezier(.4,0,.2,1);pointer-events:none}
#info-panel.visible{transform:translateX(0);pointer-events:all}
#info-close{position:absolute;top:9px;right:9px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:3px 6px;border-radius:4px;transition:background .1s,color .1s}
#info-close:hover{background:var(--surface2);color:var(--text)}
#info-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text);padding-right:22px;margin-bottom:8px}
#info-badge{display:inline-block;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;margin-bottom:10px;color:#fff}
#info-text{font-size:12px;color:var(--text2);line-height:1.65}
#nav-row{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:1000}
.nav-btn{background:rgba(18,19,31,0.92);border:1px solid var(--border2);color:var(--text2);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:12px;font-family:'Source Sans 3',sans-serif;backdrop-filter:blur(6px);transition:all .15s;white-space:nowrap}
.nav-btn:hover:not(:disabled){background:var(--surface2);border-color:var(--gold2);color:var(--gold)}
.nav-btn:disabled{opacity:.25;cursor:not-allowed}
.leaflet-tooltip{background:rgba(18,19,31,0.93)!important;border:1px solid rgba(255,255,255,0.18)!important;color:#e8e6dc!important;font-family:'Source Sans 3',sans-serif!important;font-size:12px!important;border-radius:5px!important;padding:4px 10px!important;box-shadow:none!important}
.leaflet-bar a{background:rgba(18,19,31,0.92)!important;color:#e8e6dc!important;border-color:rgba(255,255,255,0.18)!important}
.leaflet-bar a:hover{background:#252840!important}
.leaflet-control-attribution{font-size:9px!important;background:rgba(18,19,31,0.7)!important;color:#6b6978!important}
.leaflet-control-attribution a{color:#9896a0!important}
</style>
</head>

</div>

/* Bygg lookup: geoKey → country-post */
const countryLookup = new Map();
COUNTRY_INFO.forEach(c => c.geoKeys.forEach(k => countryLookup.set(k, c)));
function findCountryInfo(name) {
  const n = (name||'').toLowerCase().trim();
  if (countryLookup.has(n)) return countryLookup.get(n);
  for (const [k, v] of countryLookup)
    if (n.includes(k) || k.includes(n)) return v;
  return null;
}

/* ═══ VITLISTA FÖR EUROPEISKA FEATURES ══════════════════════════ */
const EU_NAMES = new Set([
  'russian empire','russia','german empire','germany','weimar republic',
  'austria-hungary','austro-hungarian empire','austria','hungary',
  'ottoman empire','turkey','france','united kingdom','british empire',
  'great britain','italy','spain','portugal','belgium','netherlands',
  'switzerland','sweden','norway','denmark','finland','estonia','latvia',
  'lithuania','poland','czechoslovakia','yugoslavia','serbia','romania',
  'bulgaria','greece','albania','montenegro','luxembourg','liechtenstein',
  'ukraine','byelorussia','belarus','georgia','armenia','azerbaijan',
  'moldova','prussia','bohemia','moravia','galicia','transylvania',
  'andorra','monaco','san marino','free city of danzig','danzig',
  'kingdom of serbs','kingdom of serbia','roumania','rumania',
  'cisleithania','transleithania','sakartvelo','hayastan','azərbaycan',
]);
function isEuropean(f) {
  const n = (f.properties?.NAME || f.properties?.name || '').toLowerCase();
  if (!n) return false;
  return EU_NAMES.has(n) || Array.from(EU_NAMES).some(k => n.includes(k));
}

/* ═══ STATE ══════════════════════════════════════════════════════ */
let currentStep = 0, map;
let baseLayer1914 = null, baseLayer1920 = null, activeBaseLayer = null;
let overlayLayers = {};
let activeFeature = null; // {type:'territory'|'country', id?, country?}
const geoCache = {};
const featureLookup = new Map(); // name_lower → geometry (from 1920 GeoJSON)

/* ═══ MAP INIT ═══════════════════════════════════════════════════ */
function initMap() {
  map = L.map('map', {center:[52,26],zoom:4,minZoom:3,maxZoom:9});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}.png', {
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd',maxZoom:19,
  }).addTo(map);
}

/* ═══ LOAD GEOJSON ═══════════════════════════════════════════════ */
async function loadGeoJSON(year) {
  if (geoCache[year]) return geoCache[year];
  const url = `https://cdn.jsdelivr.net/gh/aourednik/historical-basemaps@master/geojson/world_${year}.geojson`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} för år ${year}`);
  const data = await resp.json();
  geoCache[year] = data;
  return data;
}

/* ═══ POPULATE FEATURE LOOKUP (för overlay-geometrier) ══════════ */
function populateLookup(data) {
  data.features.forEach(f => {
    const keys = ['NAME','name','LABEL','label','SOVEREIGNT','ADMIN','COUNTRY']
      .map(k => (f.properties?.[k]||'').toLowerCase().trim()).filter(Boolean);
    keys.forEach(k => { if (!featureLookup.has(k)) featureLookup.set(k, f.geometry); });
  });
}

function findGeometry(geoNames) {
  for (const n of geoNames) {
    if (featureLookup.has(n)) return featureLookup.get(n);
    for (const [k, g] of featureLookup)
      if (k.includes(n) || n.includes(k)) return g;
  }
  return null;
}

/* ═══ BUILD BASE LAYER ═══════════════════════════════════════════ */
function buildBaseLayer(data) {
  return L.geoJSON(data, {
    filter: f => isEuropean(f),
    style: f => {
      const nm = f.properties?.NAME || f.properties?.name || '';
      const ci = findCountryInfo(nm);
      const key = ci ? ci.steps[currentStep].ctrl : 'neutral';
      const c = CTRL[key] || CTRL.neutral;
      return {fillColor:c.fill, color:c.stroke, weight:0.8, fillOpacity:0.28, opacity:0.6};
    },
    onEachFeature: (f, lyr) => {
      const nm = f.properties?.NAME || f.properties?.name || '';
      const ci = findCountryInfo(nm);
      const label = ci ? ci.name : nm;
      if (label) lyr.bindTooltip(label, {sticky:true, direction:'top', offset:[0,-4]});
      if (ci) {
        lyr.on('click', e => { L.DomEvent.stopPropagation(e); showCountryInfo(ci); });
        lyr.on('mouseover', function() { this.setStyle({fillOpacity:0.5}); });
        lyr.on('mouseout', function() { this.setStyle({fillOpacity:0.28}); });
      }
    }
  });
}

/* ═══ SWITCH BASE LAYER ══════════════════════════════════════════ */
function switchBaseLayer(year) {
  const nl = year===1914 ? baseLayer1914 : baseLayer1920;
  if (nl===activeBaseLayer) { refreshBaseStyles(); return; }
  if (activeBaseLayer) map.removeLayer(activeBaseLayer);
  nl.addTo(map); nl.bringToBack();
  activeBaseLayer = nl;
  Object.values(overlayLayers).forEach(l => l.bringToFront());
}

function refreshBaseStyles() {
  if (!activeBaseLayer) return;
  activeBaseLayer.eachLayer(lyr => {
    const nm = lyr.feature?.properties?.NAME || lyr.feature?.properties?.name || '';
    const ci = findCountryInfo(nm);
    if (ci) {
      const key = ci.steps[currentStep].ctrl;
      const c = CTRL[key]||CTRL.neutral;
      lyr.setStyle({fillColor:c.fill, color:c.stroke});
    }
  });
}

/* ═══ BUILD OVERLAYS ═════════════════════════════════════════════ */
function buildOverlays() {
  TERRITORIES.forEach(t => {
    const geom = (t.geoNames?.length ? findGeometry(t.geoNames) : null)
      || {type:'Polygon', coordinates:[t.coords]};
    const layer = L.geoJSON(
      {type:'Feature', properties:{id:t.id,name:t.name}, geometry:geom},
      {
        style: () => overlayStyle(t.id),
        onEachFeature: (_f, lyr) => {
          lyr.bindTooltip(`<strong>${t.name}</strong>`, {sticky:true,direction:'top',offset:[0,-4]});
          lyr.on('click', e => { L.DomEvent.stopPropagation(e); showTerritoryInfo(t.id); });
          lyr.on('mouseover', function() { this.setStyle({fillOpacity:0.85,weight:2.5}); this.bringToFront(); });
          lyr.on('mouseout', function() { this.setStyle(overlayStyle(t.id)); });
        }
      }
    ).addTo(map);
    overlayLayers[t.id] = layer;
  });
}

function overlayStyle(id) {
  const t = TERRITORIES.find(x=>x.id===id);
  const c = CTRL[t.steps[currentStep].ctrl];
  return {fillColor:c.fill, color:c.stroke, weight:1.5, fillOpacity:0.68, opacity:1};
}

function updateOverlays() {
  TERRITORIES.forEach(t => overlayLayers[t.id]?.setStyle(overlayStyle(t.id)));
}

/* ═══ INFO PANEL ══════════════════════════════════════════════════ */
function showPanel({name, ctrl, status, info}) {
  const c = CTRL[ctrl]||CTRL.neutral;
  document.getElementById('info-name').textContent = name;
  const b = document.getElementById('info-badge');
  b.textContent = status; b.style.background = c.fill;
  document.getElementById('info-text').textContent = info;
  document.getElementById('info-panel').classList.add('visible');
}

function showTerritoryInfo(id) {
  const t = TERRITORIES.find(x=>x.id===id); if (!t) return;
  activeFeature = {type:'territory', id};
  const s = t.steps[currentStep];
  showPanel({name:t.name, ctrl:s.ctrl, status:s.status, info:s.info});
}

function showCountryInfo(ci) {
  activeFeature = {type:'country', ci};
  const s = ci.steps[currentStep];
  showPanel({name:ci.name, ctrl:s.ctrl, status:s.status, info:s.info});
}

function hideInfo() {
  activeFeature = null;
  document.getElementById('info-panel').classList.remove('visible');
}

/* ═══ LEGEND ══════════════════════════════════════════════════════ */
function updateLegend() {
  const seen = new Map();
  TERRITORIES.forEach(t => { const k=t.steps[currentStep].ctrl; if(!seen.has(k)) seen.set(k,CTRL[k]); });
  const el = document.getElementById('legend-items');
  el.innerHTML = '';
  seen.forEach((c,k) => {
    const d = document.createElement('div'); d.className='legend-item';
    d.innerHTML=`<span class="legend-swatch" style="background:${c.fill}"></span><span>${c.name}</span>`;
    el.appendChild(d);
  });
}

/* ═══ TIMELINE ════════════════════════════════════════════════════ */
function buildTimeline() {
  const el = document.getElementById('timeline');
  STEPS.forEach((s,i) => {
    const btn = document.createElement('button');
    btn.className='step-btn'+(i===0?' active':'');
    btn.innerHTML=`<span class="yr">${s.year}</span><span class="lbl">${s.label}</span>`;
    btn.addEventListener('click', ()=>setStep(i));
    el.appendChild(btn);
  });
}

/* ═══ SET STEP ════════════════════════════════════════════════════ */
function setStep(i) {
  currentStep = i;
  document.querySelectorAll('.step-btn').forEach((b,idx)=>b.classList.toggle('active',idx===i));
  document.getElementById('step-desc').textContent = STEPS[i].desc;
  document.getElementById('prev-btn').disabled = i===0;
  document.getElementById('next-btn').disabled = i===STEPS.length-1;
  switchBaseLayer(STEPS[i].geojsonYear);
  updateOverlays();
  updateLegend();
  if (activeFeature?.type==='territory') showTerritoryInfo(activeFeature.id);
  if (activeFeature?.type==='country')   showCountryInfo(activeFeature.ci);
}

/* ═══ KEYBOARD ════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  if (e.key==='ArrowRight' && currentStep<STEPS.length-1) setStep(currentStep+1);
  if (e.key==='ArrowLeft'  && currentStep>0)              setStep(currentStep-1);
  if (e.key==='Escape') hideInfo();
});

/* ═══ EVENTS ══════════════════════════════════════════════════════ */
document.getElementById('info-close').addEventListener('click', hideInfo);
document.getElementById('prev-btn').addEventListener('click', ()=>{ if(currentStep>0) setStep(currentStep-1); });
document.getElementById('next-btn').addEventListener('click', ()=>{ if(currentStep<STEPS.length-1) setStep(currentStep+1); });

/* ═══ BOOT ════════════════════════════════════════════════════════ */
async function boot() {
  buildTimeline(); initMap();
  const msg = document.getElementById('loading-msg');
  const err = document.getElementById('loading-error');
  try {
    msg.textContent = 'Hämtar 1914 års karta…';
    const d1914 = await loadGeoJSON(1914);
    baseLayer1914 = buildBaseLayer(d1914);

    msg.textContent = 'Hämtar 1920 års karta…';
    const d1920 = await loadGeoJSON(1920);
    populateLookup(d1920); // bygg geometrilookup för overlays
    baseLayer1920 = buildBaseLayer(d1920);

    buildOverlays();
    setStep(0);
    document.getElementById('loading').classList.add('hidden');
  } catch(e) {
    console.error(e);
    document.getElementById('loading-spinner').style.display='none';
    msg.style.display='none';
    err.style.display='block';
    err.innerHTML=`<strong>Kunde inte ladda kartfilerna.</strong><br><br>Sidan måste öppnas från en webbserver, inte som lokal fil.<br>Ladda upp till GitHub Pages — det fungerar automatiskt.<br><br>Fel: ${e.message}`;
  }
}
boot();
</script>
